<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线学习平台</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">在线学习平台</h1>
            <nav class="nav">
                <a href="#" class="nav-link active" data-page="course-list">课程列表</a>
                <a href="#" class="nav-link" data-page="my-learning">我的学习</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <!-- Course List Page -->
            <section id="course-list-page" class="page active">
                <div class="page-header">
                    <h2>全部课程</h2>
                </div>
                <div id="course-list" class="course-grid">
                    <!-- Courses will be loaded here -->
                </div>
                <div id="course-list-loading" class="loading-state hidden">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>
                <div id="course-list-empty" class="empty-state hidden">
                    <p>暂无课程</p>
                </div>
            </section>

            <!-- Course Detail Page -->
            <section id="course-detail-page" class="page">
                <button class="back-btn" data-back="course-list">
                    <span>&larr;</span> 返回课程列表
                </button>
                <div id="course-detail" class="course-detail">
                    <!-- Course details will be loaded here -->
                </div>
                <div id="course-detail-loading" class="loading-state hidden">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>
            </section>

            <!-- My Learning Page -->
            <section id="my-learning-page" class="page">
                <div class="page-header">
                    <h2>我的学习</h2>
                </div>
                <div id="enrolled-courses" class="course-grid">
                    <!-- Enrolled courses will be loaded here -->
                </div>
                <div id="my-learning-loading" class="loading-state hidden">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>
                <div id="my-learning-empty" class="empty-state hidden">
                    <div class="empty-content">
                        <p>您还没有报名任何课程</p>
                        <a href="#" class="btn btn-primary" data-page="course-list">去选课</a>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 在线学习平台. All rights reserved.</p>
        </div>
    </footer>

    <!-- Enrollment Modal -->
    <div id="enroll-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-success">
                <div class="success-icon">&#10003;</div>
                <h3>报名成功！</h3>
                <p>您已成功报名该课程，可以开始学习了。</p>
                <div class="modal-actions">
                    <button class="btn btn-primary" id="modal-start-learning">开始学习</button>
                    <button class="btn btn-secondary" id="modal-close">稍后再说</button>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
